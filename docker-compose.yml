services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: decoraciones-sqlserver
    environment:
      SA_PASSWORD: "Decoraciones@2024"
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Express"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'Decoraciones@2024' -Q 'SELECT 1' -No -C || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

volumes:
  sqlserver_data:
    name: decoraciones-sqlserver-data
