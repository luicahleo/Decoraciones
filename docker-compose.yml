services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: decoraciones-sqlserver
    environment:
      SA_PASSWORD: "Decoraciones@2024"
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Express"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'Decoraciones@2024' -Q 'SELECT 1' -No -C || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: decoraciones-app
    environment:
      ASPNETCORE_ENVIRONMENT: "Development"
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=DecorationsDb;User Id=sa;Password=Decoraciones@2024;TrustServerCertificate=True;MultipleActiveResultSets=true"
    ports:
      - "8080:8080"
    volumes:
      - app_uploads:/app/wwwroot/uploads
      - ./logs:/app/logs
    depends_on:
      sqlserver:
        condition: service_healthy
    restart: unless-stopped

volumes:
  sqlserver_data:
    name: decoraciones-sqlserver-data
  app_uploads:
    name: decoraciones-app-uploads
