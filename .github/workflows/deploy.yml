name: Deploy to Production

# Despliegue de Decoraciones al VPS (patrón icarus):
#   1) El runner compila y publica los binarios (.NET 10).
#   2) rsync de los binarios al VPS -> /var/apps/decoraciones/web/
#   3) Por SSH: reconstruye la imagen runtime y levanta el contenedor con docker compose.
#
# Secrets requeridos en el repositorio (Settings -> Secrets and variables -> Actions):
#   VPS_HOST     -> 194.164.171.217
#   VPS_USER     -> root
#   VPS_SSH_KEY  -> clave privada SSH autorizada en el VPS (ver 03_respuestas_agente_local.md)
#
# En el VPS deben existir previamente (los crea el agente del VPS):
#   /var/apps/decoraciones/docker-compose.yml
#   /var/apps/decoraciones/Dockerfile.web
#   /var/apps/decoraciones/.env

on:
  push:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: deploy-decoraciones
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore src/Decorations.Web/Decorations.Web.csproj

      - name: Publish
        run: dotnet publish src/Decorations.Web/Decorations.Web.csproj -c Release -o ./publish /p:UseAppHost=false

      - name: Configurar clave SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Añadir el VPS a known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: rsync de los binarios publicados
        run: |
          rsync -avz --delete \
            ./publish/ \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/var/apps/decoraciones/web/

      - name: Reconstruir y levantar el contenedor
        run: |
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'ENDSSH'
            set -e
            cd /var/apps/decoraciones
            docker compose up -d --build decoraciones
            docker image prune -f
          ENDSSH

      - name: Comprobación post-despliegue
        run: |
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'ENDSSH'
            set -e
            sleep 8
            docker compose -f /var/apps/decoraciones/docker-compose.yml ps
            curl -fsS -o /dev/null -w "HTTP %{http_code}\n" http://127.0.0.1:8082/ || \
              (echo "La app no responde en 127.0.0.1:8082"; docker compose -f /var/apps/decoraciones/docker-compose.yml logs --tail=50 decoraciones; exit 1)
          ENDSSH
